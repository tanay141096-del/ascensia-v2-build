name: Build and deploy

# Hostinger auto-deploys directly from the master branch (runs npm run build
# then npm start). This workflow only handles the GitHub Pages preview build.

on:
  push:
    branches: [master]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-and-deploy-preview:
    # Static export with /acsensia-v2-build basePath, published to gh-pages
    # for a public preview URL on GitHub Pages.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build static export (GitHub Pages basePath)
        run: npm run build
        env:
          NEXT_PUBLIC_DEPLOY_TARGET: ghpages

      - name: Publish out/ to gh-pages branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          publish_branch: gh-pages
