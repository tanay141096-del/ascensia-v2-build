name: Build and deploy static site

# Builds the Next.js static export on every push to master and publishes
# the result to the `deploy` branch. Point Hostinger's Git Auto Deploy
# feature at the `deploy` branch (with deploy path set to the repo root,
# which maps to public_html) so the live site updates automatically.

on:
  push:
    branches: [master]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build

      - name: Publish out/ to deploy branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          publish_branch: deploy

  build-and-deploy-preview:
    # Separate build with a /acsensia-v2-build basePath, published to
    # gh-pages, so GitHub Pages gives a real public preview URL without
    # touching the basePath-free build that Hostinger uses.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build static export (GitHub Pages basePath)
        run: npm run build
        env:
          NEXT_PUBLIC_DEPLOY_TARGET: ghpages

      - name: Publish out/ to gh-pages branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          publish_branch: gh-pages
          force_orphan: true
